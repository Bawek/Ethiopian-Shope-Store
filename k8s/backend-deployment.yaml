apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ethiopian-shop
  labels:
    app: backend
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        version: v1
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - backend
              topologyKey: kubernetes.io/hostname
      containers:
      - name: backend
        image: ethiopian-shop-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: NODE_ENV
        - name: PORT
          value: "8000"
        - name: HOST
          value: "0.0.0.0"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: REDIS_URL
        - name: ACCESS_TOKEN_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: ACCESS_TOKEN_SECRET
        - name: REFRESH_TOKEN_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: REFRESH_TOKEN_SECRET
        - name: CHAPA_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: CHAPA_SECRET_KEY
        - name: CHAPA_PUBLIC_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: CHAPA_PUBLIC_KEY
        - name: CHAPA_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: CHAPA_ENCRYPTION_KEY
        - name: EMAIL_SERVER_HOST
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: EMAIL_SERVER_HOST
        - name: EMAIL_SERVER_PORT
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: EMAIL_SERVER_PORT
        - name: EMAIL_SERVER_USER
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: EMAIL_SERVER_USER
        - name: EMAIL_SERVER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: EMAIL_SERVER_PASSWORD
        - name: ADMIN_EMAIL
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: ADMIN_EMAIL
        - name: SIGNING_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: SIGNING_SECRET
        - name: CORS_ORIGIN
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: CORS_ORIGIN
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: LOG_LEVEL
        - name: LOG_FORMAT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: LOG_FORMAT
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 40
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: ethiopian-shop
  labels:
    app: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
