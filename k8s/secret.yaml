# ============================================================================
# KUBERNETES SECRETS
# NOTE: In production, use external secret management (Sealed Secrets, Vault)
# This template shows the structure - replace with actual secret values
# ============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: ethiopian-shop
type: Opaque
stringData:
  # Database
  DATABASE_URL: "postgresql://user:password@postgres:5432/ethiopian_shop"
  
  # JWT Secrets
  ACCESS_TOKEN_SECRET: "your-super-secret-access-token-key-min-32-chars-long"
  REFRESH_TOKEN_SECRET: "your-super-secret-refresh-token-key-min-32-chars-long"
  
  # Payment Gateway
  CHAPA_SECRET_KEY: "your-chapa-secret-key"
  CHAPA_PUBLIC_KEY: "your-chapa-public-key"
  CHAPA_ENCRYPTION_KEY: "your-chapa-encryption-key"
  
  # Email
  EMAIL_SERVER_HOST: "smtp.gmail.com"
  EMAIL_SERVER_PORT: "587"
  EMAIL_SERVER_USER: "your-email@gmail.com"
  EMAIL_SERVER_PASSWORD: "your-app-password"
  ADMIN_EMAIL: "admin@ethiopianshop.com"
  
  # Security
  SIGNING_SECRET: "your-webhook-signing-secret-min-32-chars-long"
  CORS_ORIGIN: "https://ethiopianshop.com"
  
  # Redis
  REDIS_URL: "redis://:password@redis:6379"
  REDIS_PASSWORD: "redispassword"
  
  # Optional
  SENTRY_DSN: "https://your-sentry-dsn@sentry.io/project-id"
  GEMINI_API_KEY: "your-gemini-api-key"

---
apiVersion: v1
kind: Secret
metadata:
  name: tls-secret
  namespace: ethiopian-shop
type: kubernetes.io/tls
data:
  tls.crt: 
  tls.key: 
